name: downpour
description: "Open-source video downloader for macOS, Windows, and Linux, powered by yt-dlp."
publish_to: 'none'
version: 0.1.1+2

environment:
  sdk: ^3.12.2

dependencies:
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  forui: ^0.23.0
  go_router: ^17.3.0
  local_notifier: ^0.1.6
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5
  super_drag_and_drop: ^0.9.1
  url_launcher: ^6.3.2
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  patrol: ^4.6.1
  integration_test:
    sdk: flutter
  patrol_finders: ^3.5.0
  drift_dev: ^2.34.0
  flutter_launcher_icons: ^0.14.4
flutter:
  uses-material-design: true

patrol:
  app_name: Downpour
  test_directory: integration_test
  macos:
    bundle_id: dev.harkirat.downpour

flutter_launcher_icons:
  macos:
    generate: true
    image_path: assets/icon/icon_macos.png
  windows:
    generate: true
    image_path: assets/icon/icon.png
    icon_size: 256
